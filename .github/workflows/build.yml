name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix build && cp -rL result _site

      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx netlify-cli deploy --dir=_site --prod --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        run: npx netlify-cli deploy --dir=_site --alias=pr-${{ github.event.pull_request.number }} --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Preview: https://pr-${{ github.event.pull_request.number }}--nobodywho-website.netlify.app"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
